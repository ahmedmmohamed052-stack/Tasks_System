<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FocusSpace</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css"/>

  <!-- React + ReactDOM + Babel (for JSX in browser) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-background-primary:   rgba(255,255,255,0.90);
      --color-background-secondary: rgba(237,232,255,0.55);
      --color-background-tertiary:  #F5F3FF;
      --color-text-primary:         #18102E;
      --color-text-secondary:       #6B5B8E;
      --color-text-tertiary:        #A898C8;
      --color-border-tertiary:      rgba(214,205,240,0.65);
      --color-border-secondary:     rgba(190,175,230,0.75);
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Bricolage Grotesque', sans-serif;
      --border-radius-md: 12px;
      --border-radius-lg: 22px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    h1, h2, h3 { font-family: var(--font-display); }

    /* ── gradient blob background ── */
    body::before, body::after { content:''; position:fixed; border-radius:50%; pointer-events:none; z-index:0; }
    body::before {
      top:-18%; right:-12%;
      width:58vw; height:58vw; max-width:600px; max-height:600px;
      background: radial-gradient(circle at 40% 40%, rgba(111,66,255,0.17) 0%, rgba(180,150,255,0.07) 50%, transparent 72%);
      animation: blobA 9s ease-in-out infinite;
    }
    body::after {
      bottom:-18%; left:-10%;
      width:52vw; height:52vw; max-width:540px; max-height:540px;
      background: radial-gradient(circle at 60% 60%, rgba(255,77,141,0.14) 0%, rgba(255,150,180,0.06) 50%, transparent 72%);
      animation: blobB 12s ease-in-out infinite;
    }
    #blob-mint {
      position:fixed; top:45%; left:42%;
      width:44vw; height:44vw; max-width:460px; max-height:460px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(0,200,150,0.09) 0%, transparent 68%);
      pointer-events:none; z-index:0;
      animation: blobC 14s ease-in-out infinite;
    }
    @keyframes blobA { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-22px,22px) scale(1.04)} 66%{transform:translate(14px,-14px) scale(0.97)} }
    @keyframes blobB { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(18px,-18px) scale(1.03)} 66%{transform:translate(-12px,12px) scale(0.98)} }
    @keyframes blobC { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-24px,18px) scale(1.06)} }

    #root { position:relative; z-index:1; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .page-anim { animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both; }

    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:rgba(111,66,255,0.2); border-radius:2px; }
  </style>
</head>
<body>
  <div id="blob-mint"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ═══════════════════════ DATA ═══════════════════════ */
    const WF = {
      "Technology":["Programming","Web Development","Mobile Development","AI / Machine Learning","Cybersecurity","Data Science","DevOps","Databases","Embedded Systems"],
      "Design":["Graphic Design","UI/UX","Motion Graphics","3D Design","Video Editing","Photography"],
      "Business & Management":["Marketing","Sales","Accounting","Human Resources","Project Management","Entrepreneurship","Financial Analysis"],
      "Medicine & Health":["Medicine","Pharmacy","Nursing","Dentistry","Physical Therapy","Nutrition"],
      "Engineering":["Civil Engineering","Electrical Engineering","Mechanical Engineering","Chemical Engineering","Architecture","Electronics"],
      "Law":["Legal Research","Contracts","Commercial Law","International Law"],
      "Languages & Translation":["Translation","Language Teaching","Linguistics"],
      "Media & Writing":["Journalism","Content Writing","Copywriting","Authoring","Script Writing"],
      "Education":["Studying","Academic Research","Exam Preparation","Curriculum Design"],
      "Science":["Mathematics","Physics","Chemistry","Biology","Statistics"],
      "Arts":["Music","Drawing","Fine Arts","Creative Writing"],
      "Other":["Other"],
    };
    const SF = {
      "Technology & CS":["Programming Fundamentals","Data Structures","Web Development","AI & ML","Cybersecurity","Data Science"],
      "Mathematics":["Algebra","Calculus","Discrete Math","Linear Algebra","Statistics"],
      "Natural Sciences":["Physics","Chemistry","Biology","Geology","Biochemistry"],
      "Medicine & Health":["Anatomy","Physiology","Pharmacology","Pathology","Microbiology"],
      "Engineering":["Civil","Electrical","Mechanical","Chemical","Electronics","Thermodynamics"],
      "Business & Economics":["Microeconomics","Macroeconomics","Accounting","Finance","Marketing"],
      "Law":["Constitutional Law","Criminal Law","Civil Law","Commercial Law"],
      "Languages":["Arabic","English","French","German","Spanish","Chinese"],
      "Social Sciences":["Sociology","Psychology","Political Science","Philosophy"],
      "History & Humanities":["Ancient History","Modern History","Islamic History","Cultural Studies"],
      "High School — Science":["Pure Mathematics","Physics","Chemistry","Biology","Arabic","English"],
      "High School — Arts":["History","Geography","Philosophy","Psychology","Arabic","English"],
      "Middle School":["Arabic","English","Mathematics","Physics","Chemistry","Biology","History"],
      "Primary School":["Arabic","English","Mathematics","Science","Social Studies"],
      "Other":["Other"],
    };
    const ICONS = {
      "Technology":"ti-device-laptop","Technology & CS":"ti-device-laptop",
      "Design":"ti-palette","Business & Management":"ti-chart-bar","Business & Economics":"ti-chart-bar",
      "Medicine & Health":"ti-stethoscope","Engineering":"ti-settings-2","Law":"ti-scale",
      "Languages & Translation":"ti-world","Languages":"ti-world","Media & Writing":"ti-pencil",
      "Education":"ti-book-2","Science":"ti-flask","Mathematics":"ti-math",
      "Natural Sciences":"ti-leaf","Arts":"ti-music","Social Sciences":"ti-brain",
      "History & Humanities":"ti-building-arch","High School — Science":"ti-school",
      "High School — Arts":"ti-school","Middle School":"ti-school","Primary School":"ti-school",
      "Other":"ti-dots-circle-horizontal",
    };
    const FIELD_CLR = {
      "Technology":["#EDE8FF","#6F42FF"],"Technology & CS":["#EDE8FF","#6F42FF"],
      "Design":["#FFE8F2","#FF4D8D"],"Business & Management":["#FFF0D6","#FF9500"],"Business & Economics":["#FFF0D6","#FF9500"],
      "Medicine & Health":["#DCFDF4","#00C896"],"Engineering":["#FFF3E0","#FF8C00"],"Law":["#E8F0FF","#4A6CF7"],
      "Languages & Translation":["#FFF0F5","#FF6B9D"],"Languages":["#FFF0F5","#FF6B9D"],
      "Media & Writing":["#FFF0D6","#FF9500"],"Education":["#EDE8FF","#6F42FF"],
      "Science":["#DCFDF4","#00C896"],"Mathematics":["#F3E8FF","#9B5DE5"],
      "Natural Sciences":["#E8FFE8","#00B347"],"Arts":["#FFE8F2","#FF4D8D"],
      "Social Sciences":["#E8F4FF","#007BFF"],"History & Humanities":["#FFF3E0","#FF8C00"],
      "High School — Science":["#EDE8FF","#6F42FF"],"High School — Arts":["#FFE8F2","#FF4D8D"],
      "Middle School":["#DCFDF4","#00C896"],"Primary School":["#FFF0D6","#FF9500"],
      "Other":["#F0F0F0","#888888"],
    };
    const GA = new Set(["Technology","Business & Management","Medicine & Health","Engineering","Technology & CS","Business & Economics"]);
    const GB = new Set(["Design","Law","Languages & Translation","Media & Writing","Arts","Languages"]);
    const TM = { A:{easy:40,medium:60,hard:90}, B:{easy:30,medium:45,hard:75}, C:{easy:35,medium:50,hard:85} };
    const grp = f => GA.has(f)?"A":GB.has(f)?"B":"C";
    const dur = (f,d) => TM[grp(f)][d]??30;

    function buildPlan(tasks) {
      const ord={hard:0,medium:1,easy:2};
      const sorted=[...tasks].sort((a,b)=>ord[a.diff]-ord[b.diff]);
      const blocks=[]; let c=0;
      sorted.forEach((t,i)=>{
        blocks.push({type:"work",task:t,dur:t.dur,start:c}); c+=t.dur;
        if(i<sorted.length-1){blocks.push({type:"break",task:null,dur:10,start:c}); c+=10;}
      });
      return { blocks, tasks:sorted, total:c, work:sorted.reduce((s,t)=>s+t.dur,0) };
    }
    function calcScore(tasks, actual) {
      const done=tasks.filter(t=>t.done).length, n=tasks.length;
      const plan=tasks.reduce((s,t)=>s+t.dur,0);
      const cs=n>0?done/n:0, ta=plan>0?Math.max(0,1-Math.abs(actual-plan)/plan):0;
      return Math.round((cs*0.6+ta*0.4)*100);
    }

    /* ═══════════════════════ FIREBASE INIT ═══════════════════════ */
    const firebaseConfig = {
      apiKey:            "AIzaSyBzaY33Wi7V_T22EuBk-045WwEtFqTsV4Y",
      authDomain:        "tasks-system-ace8a.firebaseapp.com",
      projectId:         "tasks-system-ace8a",
      storageBucket:     "tasks-system-ace8a.firebasestorage.app",
      messagingSenderId: "357805533325",
      appId:             "1:357805533325:web:506703398fe76daacc9ac4",
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    /* ═══════════════════════ DESIGN TOKENS ═══════════════════════ */
    const P="#6F42FF", PL="#EDE8FF", PD="#4A28CC", PM="#9B8AFF";
    const PK="#FF4D8D", PKL="#FFE8F2", PKD="#A0164A";
    const TL="#00C896", TLL="#DCFDF4", TLD="#006A4E";
    const AM="#FF9500", AML="#FFF0D6", AMD="#7A4400";
    const DIFF={ easy:{bg:TLL,tx:TLD,lbl:"Easy"}, medium:{bg:AML,tx:AMD,lbl:"Medium"}, hard:{bg:PKL,tx:PKD,lbl:"Hard"} };

    /* ═══════════════════════ SHARED STYLES ═══════════════════════ */
    const CARD={
      background:"rgba(255,255,255,0.88)",
      backdropFilter:"blur(24px) saturate(1.5)",
      WebkitBackdropFilter:"blur(24px) saturate(1.5)",
      borderRadius:24,
      border:"1px solid rgba(255,255,255,0.96)",
      boxShadow:"0 2px 32px rgba(111,66,255,0.07), 0 1px 0 rgba(255,255,255,0.85) inset",
      padding:"22px 24px"
    };
    const INP={
      width:"100%",padding:"13px 16px",
      border:"1.5px solid var(--color-border-secondary)",
      borderRadius:14,fontFamily:"var(--font-sans)",fontSize:15,
      color:"var(--color-text-primary)",
      background:"rgba(255,255,255,0.85)",
      outline:"none",transition:"all 0.2s"
    };
    const BTNP={
      background:"linear-gradient(135deg, #6F42FF 0%, #FF4D8D 100%)",
      color:"#fff",border:"none",borderRadius:14,padding:"14px 22px",
      fontFamily:"var(--font-sans)",fontWeight:700,fontSize:15,cursor:"pointer",width:"100%",
      letterSpacing:"-0.01em",
      boxShadow:"0 4px 22px rgba(111,66,255,0.38), 0 1px 0 rgba(255,255,255,0.2) inset"
    };
    const BTNS={
      background:"rgba(255,255,255,0.82)",
      color:"var(--color-text-primary)",
      border:"1.5px solid var(--color-border-tertiary)",
      borderRadius:14,padding:"12px 20px",
      fontFamily:"var(--font-sans)",fontWeight:600,fontSize:14,cursor:"pointer",
      backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)"
    };
    const PAGE={background:"transparent",minHeight:"100vh",paddingBottom:60};
    const INNER={maxWidth:460,margin:"0 auto",padding:"28px 20px"};
    const LBL={
      fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",
      color:"var(--color-text-secondary)",display:"block",marginBottom:8
    };

    /* ═══════════════════════ SHARED COMPONENTS ═══════════════════════ */
    function Pill({label,color="purple"}){
      const m={
        purple:{bg:"linear-gradient(135deg,#EDE8FF,#DDD4FF)",tx:PD,bdr:"rgba(111,66,255,0.2)"},
        pink:  {bg:"linear-gradient(135deg,#FFE8F2,#FFD4E8)",tx:PKD,bdr:"rgba(255,77,141,0.2)"},
        teal:  {bg:"linear-gradient(135deg,#DCFDF4,#C8F7EC)",tx:TLD,bdr:"rgba(0,200,150,0.2)"},
        amber: {bg:"linear-gradient(135deg,#FFF0D6,#FFE5B4)",tx:AMD,bdr:"rgba(255,149,0,0.2)"},
      };
      const c=m[color]||m.purple;
      return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"5px 13px",borderRadius:100,fontSize:11,fontWeight:700,background:c.bg,color:c.tx,border:`1px solid ${c.bdr}`,letterSpacing:"0.02em"}}>{label}</span>;
    }
    function Back({onClick}){
      return <button onClick={onClick} style={{background:"none",border:"none",color:PM,cursor:"pointer",fontFamily:"var(--font-sans)",fontSize:14,padding:"0 0 20px",display:"flex",alignItems:"center",gap:6,fontWeight:600}}>
        <i className="ti ti-arrow-left" aria-hidden="true"/> Back
      </button>;
    }
    function ErrBox({msg}){
      return msg?<div style={{marginTop:10,padding:"11px 14px",background:PKL,borderRadius:12,color:PKD,fontSize:13,fontWeight:500,border:`1px solid rgba(255,77,141,0.2)`,borderLeft:`3px solid ${PK}`}}>{msg}</div>:null;
    }
    function OkBox({msg}){
      return msg?<div style={{marginTop:10,padding:"11px 14px",background:TLL,borderRadius:12,color:TLD,fontSize:13,fontWeight:500,border:`1px solid rgba(0,200,150,0.2)`,borderLeft:`3px solid ${TL}`}}>{msg}</div>:null;
    }
    function FocusInput({style,...props}){
      return <input style={{...INP,...style}}
        onFocus={e=>{e.target.style.borderColor=PM;e.target.style.boxShadow=`0 0 0 4px ${PL}`;e.target.style.background="#fff";}}
        onBlur={e=>{e.target.style.borderColor="var(--color-border-secondary)";e.target.style.boxShadow="none";e.target.style.background="rgba(255,255,255,0.85)";}}
        {...props}/>;
    }

    /* ═══════════════════════ AUTH PAGE ═══════════════════════ */
    function AuthPage({ onAuthSuccess }) {
      const [mode, setMode] = useState("login");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");
      const [msg, setMsg] = useState("");

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((user) => {
          if (user && user.emailVerified) onAuthSuccess(user);
        });
        return unsubscribe;
      }, []);

      async function handleEmailAuth() {
        setLoading(true); setErr(""); setMsg("");
        try {
          if (mode === "register") {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await cred.user.sendEmailVerification();
            setMsg("Verification email sent! Please check your inbox and verify before logging in.");
            auth.signOut(); setMode("login");
          } else {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            if (!cred.user.emailVerified) { setErr("Please verify your email first."); auth.signOut(); }
            else onAuthSuccess(cred.user);
          }
        } catch (error) { setErr(error.message); }
        setLoading(false);
      }

      async function handleGoogleAuth() {
        setLoading(true); setErr("");
        try {
          const cred = await auth.signInWithPopup(googleProvider);
          onAuthSuccess(cred.user);
        } catch (error) { setErr(error.message); }
        setLoading(false);
      }

      return (
        <div style={PAGE} className="page-anim">
          <div style={{...INNER,paddingTop:64,maxWidth:420}}>

            {/* Logo */}
            <div style={{marginBottom:38,textAlign:"center"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:10}}>
                <div style={{width:50,height:50,background:"linear-gradient(135deg,#6F42FF 0%,#FF4D8D 100%)",borderRadius:15,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 20px rgba(111,66,255,0.4)"}}>
                  <i className="ti ti-bolt" style={{fontSize:26,color:"#fff"}} aria-hidden="true"/>
                </div>
                <span style={{fontSize:26,fontWeight:800,fontFamily:"var(--font-display)",background:"linear-gradient(135deg,#6F42FF,#FF4D8D)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>FocusSpace</span>
              </div>
              <p style={{color:"var(--color-text-secondary)",fontSize:14,fontWeight:500}}>Your session planner ✨</p>
            </div>

            <div style={CARD}>
              <h2 style={{fontSize:22,fontWeight:800,marginBottom:4,letterSpacing:"-0.02em"}}>{mode==="login"?"Welcome back 👋":"Create account 🚀"}</h2>
              <p style={{color:"var(--color-text-secondary)",fontSize:14,marginBottom:22}}>Continue with Email or Google</p>

              <button style={{...BTNS,width:"100%",marginBottom:18,display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontWeight:700}}
                onClick={handleGoogleAuth} disabled={loading}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=PM;e.currentTarget.style.boxShadow=`0 4px 16px rgba(111,66,255,0.12)`;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--color-border-tertiary)";e.currentTarget.style.boxShadow="none";}}>
                <i className="ti ti-brand-google-filled" style={{fontSize:18,color:"#DB4437"}} aria-hidden="true"/>
                Continue with Google
              </button>

              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
                <div style={{flex:1,height:1,background:"var(--color-border-tertiary)"}}></div>
                <span style={{fontSize:11,fontWeight:700,color:"var(--color-text-tertiary)",letterSpacing:"0.08em"}}>OR</span>
                <div style={{flex:1,height:1,background:"var(--color-border-tertiary)"}}></div>
              </div>

              <label style={LBL}>Email</label>
              <FocusInput value={email} onChange={e=>setEmail(e.target.value)} placeholder="name@example.com" type="email" style={{marginBottom:14}}/>
              <label style={LBL}>Password</label>
              <FocusInput value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" type="password"/>

              <ErrBox msg={err}/>
              <OkBox msg={msg}/>

              <button style={{...BTNP,marginTop:22,opacity:loading||!email||!password?0.55:1}} onClick={handleEmailAuth} disabled={loading||!email||!password}>
                {loading?<i className="ti ti-loader-2" style={{animation:"spin 0.8s linear infinite"}} aria-hidden="true"/>:mode==="login"?"Sign In →":"Sign Up →"}
              </button>

              <p style={{fontSize:13,color:"var(--color-text-secondary)",textAlign:"center",marginTop:18,fontWeight:500}}>
                {mode==="login"?"Don't have an account? ":"Already have an account? "}
                <button onClick={()=>{setMode(mode==="login"?"register":"login");setErr("");setMsg("");}}
                  style={{background:"none",border:"none",color:P,fontWeight:700,cursor:"pointer",fontFamily:"var(--font-sans)"}}>
                  {mode==="login"?"Sign Up":"Sign In"}
                </button>
              </p>
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════ PHONE VERIFICATION PAGE ═══════════════════════ */
    function PhonePage({ user, onVerified }) {
      const [phone, setPhone] = useState("+20");
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");

      async function checkPhone() {
        if(phone.length < 10) return;
        setLoading(true); setErr("");
        try {
          const doc = await db.collection("allowedUsers").doc(phone).get();
          if (doc.exists && doc.data().active) onVerified(phone);
          else setErr("This number is not registered for workspace access. Please ask staff.");
        } catch (error) { setErr("Error checking number. Please try again."); }
        setLoading(false);
      }

      return (
        <div style={PAGE} className="page-anim">
          <div style={{...INNER,paddingTop:64,maxWidth:420}}>
            <div style={{marginBottom:32,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{background:PL,padding:"6px 12px",borderRadius:100,display:"inline-flex",alignItems:"center",gap:6}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:P}}/>
                <span style={{fontSize:12,fontWeight:700,color:PD}}>{user.email}</span>
              </div>
              <button onClick={()=>auth.signOut()} style={{background:"none",border:"none",color:PM,cursor:"pointer",fontFamily:"var(--font-sans)",fontSize:12,fontWeight:600}}>Log out</button>
            </div>

            <div style={CARD}>
              <div style={{width:48,height:48,background:"linear-gradient(135deg,#EDE8FF,#DDD4FF)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:14,boxShadow:`0 4px 12px ${PL}`}}>
                <i className="ti ti-lock" style={{fontSize:24,color:P}} aria-hidden="true"/>
              </div>
              <h2 style={{fontSize:22,fontWeight:800,marginBottom:4,letterSpacing:"-0.02em"}}>Workspace Access</h2>
              <p style={{color:"var(--color-text-secondary)",fontSize:14,marginBottom:22,fontWeight:500}}>Enter your registered phone number</p>
              <label style={LBL}>Phone number</label>
              <FocusInput value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+20 1XX XXX XXXX" type="tel"/>
              <ErrBox msg={err}/>
              <button style={{...BTNP,marginTop:20,opacity:loading||phone.length<10?0.55:1}} onClick={checkPhone} disabled={loading||phone.length<10}>
                {loading?<i className="ti ti-loader-2" style={{animation:"spin 0.8s linear infinite"}} aria-hidden="true"/>:"Check Access →"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════ SETUP PAGE ═══════════════════════ */
    function SetupPage({phone,onStart}){
      const [step,setStep]=useState("mode");
      const [mode,setMode]=useState(null);
      const [field,setField]=useState(null);
      const [sub,setSub]=useState(null);
      const [tasks,setTasks]=useState([]);
      const [name,setName]=useState("");
      const [diff,setDiff]=useState("medium");
      const fields=mode==="work"?WF:SF;
      const lbl=mode==="work"?"Task":"Topic";

      function addTask(){
        if(!name.trim())return;
        setTasks(p=>[...p,{id:Date.now()+Math.random(),name:name.trim(),diff,dur:dur(field,diff),done:false}]);
        setName("");
      }

      if(step==="mode") return(
        <div style={PAGE} className="page-anim"><div style={INNER}>
          <div style={{marginBottom:30}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:6,background:PL,padding:"5px 12px",borderRadius:100,marginBottom:14}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:P}}/>
              <span style={{fontSize:12,fontWeight:700,color:PD}}>{phone}</span>
            </div>
            <h1 style={{fontSize:28,fontWeight:800,letterSpacing:"-0.03em",lineHeight:1.15}}>What are you<br/>doing today? 💪</h1>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {[
              {k:"work",icon:"ti-briefcase",title:"Work",desc:"Projects, tasks, freelance work",grad:"linear-gradient(135deg,#6F42FF,#9B8AFF)",bg:PL},
              {k:"study",icon:"ti-book-2",title:"Study",desc:"Subjects, topics, exam prep",grad:"linear-gradient(135deg,#00C896,#00FFB3)",bg:TLL},
            ].map(o=>(
              <button key={o.k} onClick={()=>{setMode(o.k);setStep("field");}}
                style={{...CARD,cursor:"pointer",display:"flex",alignItems:"center",gap:18,textAlign:"left",width:"100%",transition:"all 0.22s",padding:"22px 24px",border:"1px solid rgba(255,255,255,0.96)"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow=`0 8px 36px rgba(111,66,255,0.14)`;}}
                onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 2px 32px rgba(111,66,255,0.07)";}}>
                <div style={{width:54,height:54,background:o.grad,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 4px 14px rgba(0,0,0,0.15)`}}>
                  <i className={`ti ${o.icon}`} style={{fontSize:26,color:"#fff"}} aria-hidden="true"/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:18,fontWeight:800,marginBottom:3,fontFamily:"var(--font-display)",letterSpacing:"-0.02em"}}>{o.title}</div>
                  <div style={{fontSize:13,color:"var(--color-text-secondary)",fontWeight:500}}>{o.desc}</div>
                </div>
                <div style={{width:32,height:32,borderRadius:10,background:"var(--color-background-secondary)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <i className="ti ti-arrow-right" style={{fontSize:16,color:"var(--color-text-tertiary)"}} aria-hidden="true"/>
                </div>
              </button>
            ))}
          </div>
        </div></div>
      );

      if(step==="field") return(
        <div style={PAGE} className="page-anim"><div style={INNER}>
          <Back onClick={()=>setStep("mode")}/>
          <div style={{marginBottom:24}}>
            <Pill label={mode==="work"?"Work":"Study"} color={mode==="work"?"purple":"teal"}/>
            <h2 style={{fontSize:24,fontWeight:800,marginTop:12,letterSpacing:"-0.02em"}}>Select your field</h2>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {Object.keys(fields).map(f=>{
              const [bg,tx]=FIELD_CLR[f]||["#EDE8FF","#6F42FF"];
              return (
                <button key={f} onClick={()=>{setField(f);setStep("subfield");}}
                  style={{...CARD,cursor:"pointer",textAlign:"center",padding:"18px 14px",transition:"all 0.2s",border:"1px solid rgba(255,255,255,0.96)"}}
                  onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow=`0 8px 28px rgba(0,0,0,0.1)`;}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 2px 32px rgba(111,66,255,0.07)";}}>
                  <div style={{width:44,height:44,background:bg,borderRadius:13,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px",border:`1px solid ${tx}22`}}>
                    <i className={`ti ${ICONS[f]||"ti-folder"}`} style={{fontSize:22,color:tx}} aria-hidden="true"/>
                  </div>
                  <span style={{fontSize:12,fontWeight:700,lineHeight:1.3,color:"var(--color-text-primary)"}}>{f}</span>
                </button>
              );
            })}
          </div>
        </div></div>
      );

      if(step==="subfield") return(
        <div style={PAGE} className="page-anim"><div style={INNER}>
          <Back onClick={()=>setStep("field")}/>
          <div style={{marginBottom:24}}>
            <Pill label={field} color={mode==="work"?"purple":"teal"}/>
            <h2 style={{fontSize:24,fontWeight:800,marginTop:12,letterSpacing:"-0.02em"}}>Pick your specialization</h2>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {fields[field].map(sf=>(
              <button key={sf} onClick={()=>{setSub(sf);setStep("tasks");}}
                style={{...CARD,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:14,fontFamily:"var(--font-sans)",fontWeight:600,color:"var(--color-text-primary)",padding:"15px 18px",transition:"all 0.2s",border:"1px solid rgba(255,255,255,0.96)"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=PM;e.currentTarget.style.transform="translateX(4px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.96)";e.currentTarget.style.transform="translateX(0)";}}>
                {sf}
                <i className="ti ti-chevron-right" style={{fontSize:16,color:"var(--color-text-tertiary)"}} aria-hidden="true"/>
              </button>
            ))}
          </div>
        </div></div>
      );

      if(step==="tasks") return(
        <div style={PAGE} className="page-anim"><div style={INNER}>
          <Back onClick={()=>setStep("subfield")}/>
          <div style={{marginBottom:22}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <Pill label={field} color={mode==="work"?"purple":"teal"}/>
              <Pill label={sub} color="amber"/>
            </div>
            <h2 style={{fontSize:24,fontWeight:800,marginTop:12,letterSpacing:"-0.02em"}}>Add your {lbl.toLowerCase()}s</h2>
            <p style={{color:"var(--color-text-secondary)",fontSize:13,marginTop:5,fontWeight:500}}>Hard tasks go first — planned automatically.</p>
          </div>

          <div style={{...CARD,marginBottom:14}}>
            <label style={LBL}>{lbl} name</label>
            <FocusInput value={name} onChange={e=>setName(e.target.value)}
              placeholder={`e.g. ${mode==="work"?"Fix login bug":"Chapter 3 review"}…`}
              onKeyDown={e=>e.key==="Enter"&&addTask()}/>

            <label style={{...LBL,marginTop:16}}>Difficulty</label>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {["easy","medium","hard"].map(d=>{
                const active=diff===d;
                return <button key={d} onClick={()=>setDiff(d)}
                  style={{flex:1,padding:"10px 0",borderRadius:12,border:`1.5px solid ${active?DIFF[d].tx:"var(--color-border-tertiary)"}`,
                    background:active?DIFF[d].bg:"rgba(255,255,255,0.6)",
                    color:active?DIFF[d].tx:"var(--color-text-secondary)",
                    fontFamily:"var(--font-sans)",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all 0.18s",
                    boxShadow:active?`0 2px 10px rgba(0,0,0,0.08)`:"none"}}>
                  {DIFF[d].lbl}
                </button>;
              })}
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"linear-gradient(135deg,rgba(237,232,255,0.7),rgba(220,253,244,0.5))",borderRadius:12,padding:"11px 15px",marginBottom:16,border:"1px solid rgba(111,66,255,0.1)"}}>
              <span style={{fontSize:13,color:"var(--color-text-secondary)",fontWeight:500}}>Estimated time</span>
              <span style={{fontSize:15,fontWeight:800,color:P,fontFamily:"var(--font-display)"}}>{dur(field,diff)} min</span>
            </div>
            <button onClick={addTask} disabled={!name.trim()} style={{...BTNP,opacity:!name.trim()?0.5:1}}>
              <i className="ti ti-plus" style={{verticalAlign:"-2px",marginRight:5}} aria-hidden="true"/>Add {lbl}
            </button>
          </div>

          {tasks.length>0&&<>
            <div style={{...CARD,marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <h3 style={{fontSize:15,fontWeight:800,letterSpacing:"-0.01em"}}>{lbl}s ({tasks.length})</h3>
                <Pill label={`${tasks.reduce((s,t)=>s+t.dur,0)+(tasks.length-1)*10} min total`} color="purple"/>
              </div>
              {tasks.map((t,i)=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 0",borderBottom:i<tasks.length-1?"1px solid var(--color-border-tertiary)":"none"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600}}>{t.name}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
                      <span style={{fontSize:11,fontWeight:700,color:DIFF[t.diff].tx,background:DIFF[t.diff].bg,padding:"2px 9px",borderRadius:100}}>{DIFF[t.diff].lbl}</span>
                      <span style={{fontSize:11,color:"var(--color-text-tertiary)",fontWeight:500}}>{t.dur} min</span>
                    </div>
                  </div>
                  <button onClick={()=>setTasks(p=>p.filter(x=>x.id!==t.id))} style={{background:"rgba(255,77,141,0.1)",border:"none",color:PK,cursor:"pointer",fontSize:18,padding:"4px 8px",borderRadius:8,lineHeight:1}}>×</button>
                </div>
              ))}
            </div>
            <button onClick={()=>onStart({mode,field,sub,plan:buildPlan(tasks)})} style={BTNP}>
              Start Session <i className="ti ti-arrow-right" style={{verticalAlign:"-2px",marginLeft:4}} aria-hidden="true"/>
            </button>
          </>}
        </div></div>
      );
      return null;
    }

    /* ═══════════════════════ SESSION PAGE ═══════════════════════ */
    function SessionPage({data,onComplete}){
      const {plan}=data;
      const [bi,setBi]=useState(0);
      const [tl,setTl]=useState(plan.blocks[0].dur*60);
      const [running,setRunning]=useState(false);
      const [done,setDone]=useState({});
      const ivl=useRef(null);
      const started=useRef(null);
      const block=plan.blocks[bi];
      const isBreak=block.type==="break";
      const pct=tl/(block.dur*60);
      const R=72, C2=2*Math.PI*R;
      const mins=Math.floor(tl/60), secs=tl%60;

      function startTimer(){
        if(!started.current)started.current=Date.now();
        setRunning(true);
        ivl.current=setInterval(()=>setTl(p=>{if(p<=1){clearInterval(ivl.current);setRunning(false);return 0;}return p-1;}),1000);
      }
      function pauseTimer(){clearInterval(ivl.current);setRunning(false);}
      function nextBlock(){
        clearInterval(ivl.current);setRunning(false);
        if(bi<plan.blocks.length-1){
          const nb=plan.blocks[bi+1];setBi(i=>i+1);setTl(nb.dur*60);
        } else {
          const actual=started.current?Math.round((Date.now()-started.current)/60000):plan.work;
          onComplete({...data,finalTasks:plan.tasks.map(t=>({...t,done:!!done[t.id]})),actual});
        }
      }
      useEffect(()=>()=>clearInterval(ivl.current),[]);

      const gradId=isBreak?"breakGrad":"focusGrad";

      return(
        <div style={PAGE} className="page-anim"><div style={INNER}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
            <Pill label={isBreak?"Break time ☕":"Focus mode 🔥"} color={isBreak?"teal":"purple"}/>
            <span style={{fontSize:13,color:"var(--color-text-secondary)",fontWeight:600}}>Block {Math.ceil((bi+1)/2)} / {plan.tasks.length}</span>
          </div>

          <div style={{display:"flex",justifyContent:"center",marginBottom:24}}>
            <div style={{position:"relative",width:200,height:200}}>
              <svg width="200" height="200" style={{transform:"rotate(-90deg)"}}>
                <defs>
                  <linearGradient id="focusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stopColor={P}/>
                    <stop offset="100%" stopColor={PK}/>
                  </linearGradient>
                  <linearGradient id="breakGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stopColor={TL}/>
                    <stop offset="100%" stopColor="#00FFB3"/>
                  </linearGradient>
                </defs>
                <circle cx="100" cy="100" r={R} fill="none" stroke="var(--color-border-tertiary)" strokeWidth="12"/>
                <circle cx="100" cy="100" r={R} fill="none" stroke={`url(#${gradId})`} strokeWidth="12" strokeLinecap="round"
                  strokeDasharray={C2} strokeDashoffset={C2*(1-pct)} style={{transition:"stroke-dashoffset 1s linear"}}/>
              </svg>
              <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
                <div style={{fontSize:42,fontWeight:800,fontFamily:"var(--font-display)",background:isBreak?`linear-gradient(135deg,${TL},#00FFB3)`:`linear-gradient(135deg,${P},${PK})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",letterSpacing:"-0.03em"}}>
                  {String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}
                </div>
                <div style={{fontSize:12,color:"var(--color-text-tertiary)",marginTop:2,fontWeight:500}}>{block.dur} min</div>
              </div>
            </div>
          </div>

          <div style={{...CARD,textAlign:"center",marginBottom:16}}>
            {isBreak?(
              <>
                <i className="ti ti-coffee" style={{fontSize:30,color:TL,display:"block",marginBottom:8}} aria-hidden="true"/>
                <h2 style={{fontSize:18,fontWeight:800,marginBottom:4,letterSpacing:"-0.01em"}}>Break time ☕</h2>
                <p style={{color:"var(--color-text-secondary)",fontSize:13,fontWeight:500}}>Stretch, hydrate, rest your eyes</p>
              </>
            ):(
              <>
                <p style={{fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",color:"var(--color-text-tertiary)",marginBottom:6,fontWeight:700}}>Working on</p>
                <h2 style={{fontSize:18,fontWeight:800,marginBottom:10,letterSpacing:"-0.01em"}}>{block.task?.name}</h2>
                <span style={{fontSize:12,fontWeight:700,color:DIFF[block.task?.diff]?.tx,background:DIFF[block.task?.diff]?.bg,padding:"4px 12px",borderRadius:100}}>{DIFF[block.task?.diff]?.lbl}</span>
              </>
            )}
          </div>

          <div style={{display:"flex",gap:10,marginBottom:16}}>
            {!running
              ?<button onClick={startTimer} style={BTNP}><i className="ti ti-player-play" style={{verticalAlign:"-2px",marginRight:5}} aria-hidden="true"/>{tl===block.dur*60?"Start":"Resume"}</button>
              :<button onClick={pauseTimer} style={{...BTNS,width:"100%"}}><i className="ti ti-player-pause" style={{verticalAlign:"-2px",marginRight:5}} aria-hidden="true"/>Pause</button>
            }
            <button onClick={nextBlock} style={{...BTNS,whiteSpace:"nowrap",padding:"11px 18px",fontWeight:700}}>
              {bi===plan.blocks.length-1?<><i className="ti ti-flag" style={{verticalAlign:"-2px",marginRight:4}} aria-hidden="true"/>Finish</>:<>Next <i className="ti ti-arrow-right" style={{verticalAlign:"-2px"}} aria-hidden="true"/></>}
            </button>
          </div>

          <div style={{display:"flex",gap:5,justifyContent:"center",marginBottom:16}}>
            {plan.blocks.map((b,i)=>(
              <div key={i} style={{
                width:b.type==="break"?6:i===bi?24:12,
                height:6,borderRadius:100,
                background:i<bi?(b.type==="break"?TL:P):i===bi?(b.type==="break"?`linear-gradient(90deg,${TL},#00FFB3)`:`linear-gradient(90deg,${P},${PK})`):"var(--color-border-tertiary)",
                border:"none",
                transition:"all 0.3s cubic-bezier(0.22,1,0.36,1)",
                boxShadow:i===bi?`0 2px 8px rgba(111,66,255,0.4)`:"none"
              }}/>
            ))}
          </div>

          <div style={CARD}>
            <h3 style={{fontSize:14,fontWeight:800,marginBottom:12,letterSpacing:"-0.01em"}}>Your tasks</h3>
            {plan.tasks.map((t,i)=>(
              <div key={t.id} onClick={()=>setDone(p=>({...p,[t.id]:!p[t.id]}))}
                style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<plan.tasks.length-1?"1px solid var(--color-border-tertiary)":"none",cursor:"pointer"}}>
                <div style={{width:22,height:22,borderRadius:7,border:"2px solid",borderColor:done[t.id]?P:"var(--color-border-secondary)",background:done[t.id]?"linear-gradient(135deg,"+P+","+PK+")":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.18s",boxShadow:done[t.id]?`0 2px 8px rgba(111,66,255,0.35)`:"none"}}>
                  {done[t.id]&&<i className="ti ti-check" style={{fontSize:13,color:"#fff"}} aria-hidden="true"/>}
                </div>
                <span style={{fontSize:13,flex:1,textDecoration:done[t.id]?"line-through":"none",color:done[t.id]?"var(--color-text-tertiary)":"var(--color-text-primary)",fontWeight:done[t.id]?400:500,transition:"all 0.18s"}}>{t.name}</span>
                <span style={{fontSize:12,color:"var(--color-text-tertiary)",fontWeight:500}}>{t.dur}m</span>
              </div>
            ))}
          </div>
        </div></div>
      );
    }

    /* ═══════════════════════ SUMMARY PAGE ═══════════════════════ */
    function SummaryPage({data,onDone}){
      const {finalTasks,actual,plan}=data;
      const [feedback, setFeedback] = useState("");
      const [feedbackSent, setFeedbackSent] = useState(false);
      const sc=calcScore(finalTasks,actual);
      const done=finalTasks.filter(t=>t.done).length;
      const scColor=sc>=80?P:sc>=60?AM:PK;
      const scColor2=sc>=80?PK:sc>=60?"#FFB800":P;
      const R=60, C2=2*Math.PI*R;

      return(
        <div style={PAGE} className="page-anim"><div style={INNER}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{width:64,height:64,background:"linear-gradient(135deg,#FFF0D6,#FFE5B4)",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",boxShadow:"0 4px 16px rgba(255,149,0,0.2)"}}>
              <i className="ti ti-trophy" style={{fontSize:34,color:AM}} aria-hidden="true"/>
            </div>
            <h1 style={{fontSize:28,fontWeight:800,marginBottom:4,letterSpacing:"-0.03em"}}>Session complete! 🎉</h1>
            <p style={{color:"var(--color-text-secondary)",fontSize:14,fontWeight:500}}>Here's how you did</p>
          </div>

          <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
            <div style={{position:"relative",width:160,height:160}}>
              <svg width="160" height="160" style={{transform:"rotate(-90deg)"}}>
                <defs>
                  <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stopColor={scColor}/>
                    <stop offset="100%" stopColor={scColor2}/>
                  </linearGradient>
                </defs>
                <circle cx="80" cy="80" r={R} fill="none" stroke="var(--color-border-tertiary)" strokeWidth="12"/>
                <circle cx="80" cy="80" r={R} fill="none" stroke="url(#scoreGrad)" strokeWidth="12" strokeLinecap="round"
                  strokeDasharray={C2} strokeDashoffset={C2*(1-sc/100)} style={{transition:"stroke-dashoffset 1.5s ease"}}/>
              </svg>
              <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
                <div style={{fontSize:38,fontWeight:800,fontFamily:"var(--font-display)",background:`linear-gradient(135deg,${scColor},${scColor2})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",letterSpacing:"-0.02em"}}>{sc}</div>
                <div style={{fontSize:11,color:"var(--color-text-tertiary)",fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>Score</div>
              </div>
            </div>
          </div>

          <p style={{textAlign:"center",fontSize:16,fontWeight:800,marginBottom:22,fontFamily:"var(--font-display)",background:`linear-gradient(135deg,${scColor},${scColor2})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",letterSpacing:"-0.01em"}}>
            {sc>=80?"Outstanding work 🔥":sc>=60?"Good session 👍":"Keep pushing 💪"}
          </p>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
            {[{label:"Tasks done",val:`${done}/${finalTasks.length}`,color:P,bg:PL},{label:"Time spent",val:`${actual}m`,color:PK,bg:PKL},{label:"Planned",val:`${plan.work}m`,color:TL,bg:TLL}].map(s=>(
              <div key={s.label} style={{background:s.bg,borderRadius:16,padding:"16px 12px",textAlign:"center",border:"1px solid rgba(255,255,255,0.9)"}}>
                <div style={{fontSize:22,fontWeight:800,color:s.color,marginBottom:4,fontFamily:"var(--font-display)",letterSpacing:"-0.02em"}}>{s.val}</div>
                <div style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:600,letterSpacing:"0.03em"}}>{s.label}</div>
              </div>
            ))}
          </div>

          <div style={{...CARD,marginBottom:14}}>
            <h3 style={{fontSize:14,fontWeight:800,marginBottom:14,letterSpacing:"-0.01em"}}>Task breakdown</h3>
            {finalTasks.map((t,i)=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<finalTasks.length-1?"1px solid var(--color-border-tertiary)":"none"}}>
                <div style={{width:20,height:20,borderRadius:6,background:t.done?"linear-gradient(135deg,"+P+","+PK+")":"var(--color-border-tertiary)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:t.done?`0 2px 6px rgba(111,66,255,0.3)`:"none"}}>
                  {t.done&&<i className="ti ti-check" style={{fontSize:11,color:"#fff"}} aria-hidden="true"/>}
                </div>
                <span style={{flex:1,fontSize:13,fontWeight:500,color:t.done?"var(--color-text-primary)":"var(--color-text-tertiary)",textDecoration:t.done?"none":"line-through"}}>{t.name}</span>
                <span style={{fontSize:11,color:"var(--color-text-tertiary)",fontWeight:500}}>{t.dur}m</span>
              </div>
            ))}
          </div>

          <div style={{...CARD,marginBottom:14}}>
            <h3 style={{fontSize:14,fontWeight:800,marginBottom:12,letterSpacing:"-0.01em"}}>Please Write your Feedback and Write any problem you faced</h3>
            {feedbackSent ? (
              <div style={{textAlign: "center", padding: "16px 10px", background: TLL, borderRadius: 14, color: TLD, border: `1px solid rgba(0,200,150,0.2)`}}>
                <i className="ti ti-circle-check" style={{fontSize: 28, marginBottom: 6, display: "block", color: TL}} aria-hidden="true"/>
                <span style={{fontWeight: 700, fontSize: 14}}>Feedback sent successfully! Thank you.</span>
              </div>
            ) : (
              <>
                <textarea 
                  value={feedback} 
                  onChange={e=>setFeedback(e.target.value)} 
                  placeholder="Your feedback..."
                  style={{...INP, minHeight: 80, resize: "vertical", marginBottom: 12}}
                  onFocus={e=>{e.target.style.borderColor=PM;e.target.style.boxShadow=`0 0 0 4px ${PL}`;e.target.style.background="#fff";}}
                  onBlur={e=>{e.target.style.borderColor="var(--color-border-secondary)";e.target.style.boxShadow="none";e.target.style.background="rgba(255,255,255,0.85)";}}
                />
                <button 
                  onClick={() => {
                    const mailtoLink = `mailto:adhamohanedahmed@gmail.com?subject=FocusSpace Feedback&body=${encodeURIComponent(feedback)}`;
                    window.location.href = mailtoLink;
                    setFeedbackSent(true);
                  }}
                  style={{...BTNS, width: "100%", fontWeight: 700, opacity: feedback.trim() ? 1 : 0.5}}
                  disabled={!feedback.trim()}
                  onMouseEnter={e=>{if(feedback.trim()){e.currentTarget.style.borderColor=PM;e.currentTarget.style.boxShadow=`0 4px 16px rgba(111,66,255,0.12)`;}}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--color-border-tertiary)";e.currentTarget.style.boxShadow="none";}}
                >
                  <i className="ti ti-mail" style={{verticalAlign:"-2px",marginRight:5}} aria-hidden="true"/> Send Feedback
                </button>
              </>
            )}
          </div>

          <button onClick={onDone} style={BTNP}>
            <i className="ti ti-plus" style={{verticalAlign:"-2px",marginRight:5}} aria-hidden="true"/>New Session
          </button>
        </div></div>
      );
    }

    /* ═══════════════════════ APP ═══════════════════════ */
    function App(){
      const [page,setPage]=useState("auth");
      const [user,setUser]=useState(null);
      const [phone,setPhone]=useState(null);
      const [sd,setSd]=useState(null);
      const [cd,setCd]=useState(null);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((u) => {
          if (u && u.emailVerified) { setUser(u); setPage("phone"); }
          else { setUser(null); setPage("auth"); }
        });
        return unsubscribe;
      }, []);

      return(
        <>
          {page==="auth"&&<AuthPage onAuthSuccess={(u)=>{setUser(u);setPage("phone");}}/>}
          {page==="phone"&&<PhonePage user={user} onVerified={p=>{setPhone(p);setPage("setup");}}/>}
          {page==="setup"&&<SetupPage phone={phone} onStart={d=>{setSd(d);setPage("session");}}/>}
          {page==="session"&&sd&&<SessionPage data={sd} onComplete={d=>{setCd(d);setPage("summary");}}/>}
          {page==="summary"&&cd&&<SummaryPage data={cd} onDone={()=>{setSd(null);setCd(null);setPage("setup");}}/>}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
